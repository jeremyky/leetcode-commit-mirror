name: Sync LeetCode submissions

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6 AM UTC — adjust to taste
  workflow_dispatch:        # lets you trigger manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push commits back to the repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so synced-ids state is accurate

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git identity
        run: |
          git config user.name "${{ secrets.GIT_NAME }}"
          git config user.email "${{ secrets.GIT_EMAIL }}"

      - name: Sync submissions
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRFTOKEN: ${{ secrets.LEETCODE_CSRFTOKEN }}
        run: python3 sync_leetcode_to_github.py

      - name: Push new commits
        run: git push origin main
